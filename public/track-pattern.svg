<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="diag" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Diagonal lines grid -->
  <rect width="400" height="400" fill="url(#diag)"/>
  <!-- Subtle "track zone" rectangles -->
  <rect x="60" y="80" width="24" height="8" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="200" y="40" width="16" height="6" rx="1.5" fill="rgba(255,255,255,0.025)"/>
  <rect x="320" y="160" width="28" height="8" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="140" y="240" width="20" height="6" rx="1.5" fill="rgba(255,255,255,0.025)"/>
  <rect x="280" y="300" width="24" height="8" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="40" y="340" width="18" height="6" rx="1.5" fill="rgba(255,255,255,0.025)"/>
  <rect x="350" y="60" width="20" height="7" rx="2" fill="rgba(255,255,255,0.028)"/>
  <rect x="100" y="360" width="22" height="6" rx="1.5" fill="rgba(255,255,255,0.025)"/>
</svg>
